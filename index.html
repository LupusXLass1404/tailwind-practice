<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tailwind-practise</title>
    <link rel="stylesheet" href="/src/tailwind.css" />
  </head>

  <body>
    <!-- 黑背景 -->
    <div class="min-h-screen bg-gray-900 text-zinc-800">
      <!-- 你的所有內容 -->
      <div
        class="mx-auto flex min-h-screen w-full max-w-screen-xl flex-col bg-white"
      >
        <!-- 網站標題區（top） -->
        <div class="w-full border-1 border-gray-600 p-4">
          <h1
            class="text-center text-2xl font-black text-zinc-950 text-shadow-lg sm:text-4xl md:text-5xl xl:text-6xl"
          >
            國立科技高中－校園社團介紹網站
          </h1>
        </div>

        <!-- 內容（main） -->
        <div
          class="grid h-full w-full flex-1 grid-cols-1 border-1 border-gray-600 md:grid-cols-[256px_1fr]"
        >
          <!-- 左邊欄 -->
          <div class="flex w-full flex-1 flex-col md:max-w-64">
            <!-- 選單區 -->
            <div class="w-full flex-1 border-1 border-gray-600 p-4 text-center">
              <h2 class="mb-2 text-2xl font-bold italic underline">社團介紹</h2>
              <ul class="flex flex-row justify-center gap-2 md:flex-col">
                <li>
                  <a href="src/guitar_history.html" target="myIframe"
                    ><button class="btn">吉他社</button></a
                  >
                </li>
                <li>
                  <button class="btn">熱舞社</button>
                </li>
                <li>
                  <button class="btn">棒球社</button>
                </li>
                <li>
                  <button class="btn">羽球社</button>
                </li>
                <li>
                  <button class="btn">足球社</button>
                </li>
                <li>
                  <button class="btn">童軍社</button>
                </li>
              </ul>
            </div>
            <!-- 日期更新區 -->
            <div class="w-full border-1 border-gray-600 p-2 text-center">
              最近更新日期：<time datetime="2026-06-04">2026/06/04</time>
            </div>
          </div>

          <!-- 右邊欄 -->
          <div class="flex flex-1 flex-col">
            <!-- 跑馬燈 -->
            <div class="w-full border-1 border-gray-600">
              <h2 class="p-4 text-center font-bold sm:text-2xl">
                歡迎光臨校園社團介紹網，參觀後請支持社團活動並熱烈參與
              </h2>
            </div>

            <!-- 網頁內容區 -->
            <iframe
              src="src/main.html"
              class="w-full flex-1 border-1 border-gray-600 p-8"
              name="myIframe"
            >
            </iframe>
          </div>
        </div>

        <!-- 頁尾版權區（footer） -->
        <div
          class="w-full border-1 border-gray-600 bg-gray-300 p-2 text-center"
        >
          網頁設計及維護：Misty
        </div>
      </div>
    </div>
    <!-- <div id="app"></div> -->
    <!-- <script type="module" src="/src/main.js"></script> -->
  </body>
</html>
