<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tailwind-practise</title>
    <link rel="stylesheet" href="/src/tailwind.css" />
  </head>

  <body>
    <!-- 黑背景 -->
    <div class="min-h-screen bg-gray-900 text-slate-900">
      <!-- 你的所有內容 -->
      <div
        class="mx-auto flex min-h-screen w-full max-w-screen-xl flex-col bg-amber-100"
      >
        <!-- 網站標題區（top） -->
        <div class="w-full border-1 border-amber-950 p-4">
          <h1
            class="text-center text-6xl font-black text-amber-800 text-shadow-lg"
          >
            國立科技高中－校園社團介紹網站
          </h1>
        </div>

        <!-- 內容（main） -->
        <div class="flex h-full w-full flex-1 border-1 border-amber-950">
          <!-- 左邊欄 -->
          <div class="flex w-64 flex-col">
            <!-- 選單區 -->
            <div
              class="w-full flex-1 border-1 border-amber-950 p-4 text-center"
            >
              <h2 class="mb-2 text-2xl font-bold italic underline">社團介紹</h2>
              <ul class="flex flex-col gap-2">
                <li>
                  <button
                    class="rounded-lg border border-amber-800 bg-amber-200 px-8 py-2 hover:bg-amber-400"
                  >
                    吉他社
                  </button>
                </li>
                <li>
                  <button
                    class="rounded-lg border border-amber-800 bg-amber-200 px-8 py-2 hover:bg-amber-400"
                  >
                    熱舞社
                  </button>
                </li>
                <li>
                  <button
                    class="rounded-lg border border-amber-800 bg-amber-200 px-8 py-2 hover:bg-amber-400"
                  >
                    棒球社
                  </button>
                </li>
                <li>
                  <button
                    class="rounded-lg border border-amber-800 bg-amber-200 px-8 py-2 hover:bg-amber-400"
                  >
                    羽球社
                  </button>
                </li>
                <li>
                  <button
                    class="rounded-lg border border-amber-800 bg-amber-200 px-8 py-2 hover:bg-amber-400"
                  >
                    足球社
                  </button>
                </li>
                <li>
                  <button
                    class="rounded-lg border border-amber-800 bg-amber-200 px-8 py-2 hover:bg-amber-400"
                  >
                    童軍社
                  </button>
                </li>
              </ul>
            </div>
            <!-- 日期更新區 -->
            <div class="w-full border-1 border-amber-950">
              最近更新日期：2026/06/04
            </div>
          </div>

          <!-- 右邊欄 -->
          <div class="flex flex-col">
            <!-- 跑馬燈 -->
            <div class="w-full border-1 border-amber-950">
              <h2 class="text-2xl">
                歡迎光臨校園社團介紹網，參觀後請支持社團活 動並熱烈參與
              </h2>
            </div>

            <!-- 網頁內容區 -->
            <div class="w-full flex-1 border-1 border-amber-950">
              嗨！歡迎加入國立科技高中。
              參加社團不僅可以豐富自己的人生、寬闊自己的視野，
              也能砥礪技能、磨練人際、培養第二專長。
              選擇一項您喜歡的社團，積極的參與和投入， 您會獲得一陣陣的驚喜！
            </div>
          </div>
        </div>

        <!-- 頁尾版權區（footer） -->
        <div class="w-full border-1 border-amber-950 bg-yellow-200 text-center">
          網頁設計及維護：Misty
        </div>
      </div>
    </div>
    <!-- <div id="app"></div> -->
    <!-- <script type="module" src="/src/main.js"></script> -->
  </body>
</html>
